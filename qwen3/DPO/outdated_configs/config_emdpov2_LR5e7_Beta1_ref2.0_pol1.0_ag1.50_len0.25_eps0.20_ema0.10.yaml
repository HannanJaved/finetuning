# EM-DPO v2 — ref2.0 pol1.0 ag1.50 len0.25 eps0.20
# Stronger agreement weight: after batch-norm the soft agreement signal is
# more informative than v1's hard sign, so a larger scale is worth exploring
model_name_or_path: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-1.7B-Base/SFT/LR5e5/
torch_dtype: bfloat16

dataset_name: allenai/Dolci-Instruct-DPO
dataset_train_split: train

bf16: true
beta: 1
do_eval: false
gradient_checkpointing_kwargs:
  use_reentrant: False
learning_rate: 5e-7
log_level: info
logging_steps: 10
lr_scheduler_type: linear
max_length: 16384
max_prompt_length: 512
num_train_epochs: 1
optim: adamw_torch
output_dir: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-1.7B-Base/SFT/Lr5e5/EMDPOv2/Beta1_LR5e-7_ref2.0_pol1.0_ag1.50_len0.25_eps0.20_ema0.10/
overwrite_output_dir: true
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
gradient_checkpointing: true
save_strategy: "steps"
save_steps: 200
save_total_limit: 20
seed: 8
warmup_ratio: 0.1
resume_from_checkpoint: false
length_normalize_logps: true

emdpo_enabled: true
emdpo_noise_eps: 0.20
emdpo_min_weight: 0.2
emdpo_max_weight: 1.0
emdpo_warmup_steps: 100
emdpo_detach_weights: true
emdpo_ref_scale: 2.0
emdpo_policy_scale: 1.0
emdpo_agreement_scale: 1.50
emdpo_length_scale: 0.25
emdpo_margin_clip: 5.0

emdpo_v2_policy_warmup_steps: 0
emdpo_v2_policy_ramp_steps: 0
emdpo_v2_policy_warmup_ratio: 0.05
emdpo_v2_policy_ramp_ratio: 0.10
emdpo_v2_norm_eps: 1.0e-6
