# Model arguments
model_name_or_path: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-1.7B-Base/SFT/LR5e5/
torch_dtype: bfloat16

# Data training arguments
dataset_name: allenai/Dolci-Instruct-DPO
dataset_train_split: train

# DPO trainer config
bf16: true
beta: 1
do_eval: false
gradient_accumulation_steps: 16
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 5.0e-7
log_level: info
logging_steps: 10
lr_scheduler_type: linear
max_length: 16384
max_prompt_length: 512
num_train_epochs: 1
optim: adamw_torch
output_dir: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-1.7B-Base/SFT/Lr5e5/SDPO_LITE/BS128_Beta1_LR5e-7_ret0.2to0.05_decay_tau0.99/
overwrite_output_dir: true
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
save_strategy: "steps"
save_steps: 1000
save_total_limit: 20
seed: 8
warmup_ratio: 0.1
resume_from_checkpoint: false

# Base normalization path
length_normalize_logps: true
length_norm_min_tokens: 1
length_norm_exponent: 1.0

# SDPO-Lite
sdpo_lite_enabled: true
sdpo_lite_beta: 1.0
sdpo_lite_retention_alpha: 0.2
sdpo_lite_decay_retention_alpha: true
sdpo_lite_retention_alpha_final: 0.05
sdpo_lite_ref_ema_enabled: true
sdpo_lite_ref_ema_tau: 0.99
sdpo_lite_warmup_steps: 100
