# EM-DPO throughput scaling short run (5% of 1 epoch)
model_name_or_path: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-1.7B-Base/SFT/LR5e5/
torch_dtype: bfloat16

dataset_name: allenai/Dolci-Instruct-DPO
dataset_train_split: train

bf16: true
beta: 1
do_eval: false
gradient_checkpointing_kwargs:
  use_reentrant: False
learning_rate: 5e-7
log_level: info
logging_steps: 5
lr_scheduler_type: linear
max_length: 16384
max_prompt_length: 512
num_train_epochs: 0.05
optim: adamw_torch
output_dir: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-1.7B-Base/SFT/Lr5e5/EMDPO/throughput/1gpu_1node/
overwrite_output_dir: true
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 32
gradient_checkpointing: true
save_strategy: "no"
seed: 8
warmup_ratio: 0.1
resume_from_checkpoint: false
length_normalize_logps: true

emdpo_enabled: true
emdpo_noise_eps: 0.20
emdpo_min_weight: 0.2
emdpo_max_weight: 1.0
emdpo_warmup_steps: 100
emdpo_detach_weights: true
emdpo_ref_scale: 2.0
emdpo_policy_scale: 1.0
emdpo_agreement_scale: 0.75
emdpo_length_scale: 0.25
emdpo_margin_clip: 5.0
