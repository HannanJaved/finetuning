# Model arguments
model_name_or_path: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-4B-Base/SFT-sweep/Qwen3-4B-SFT-LR5e-4/
torch_dtype: bfloat16

use_liger_kernel: true
attn_implementation: flash_attention_2

dataset_name:
  allenai/Dolci-Instruct-DPO

# DPOTrainer arguments
bf16: true
beta: 0.1
do_eval: false
# eval_strategy: epoch
gradient_checkpointing_kwargs:
  use_reentrant: False
learning_rate: 1e-7
log_level: info
logging_steps: 10
lr_scheduler_type: linear
max_length: 4096
max_prompt_length: 512
num_train_epochs: 1
optim: adamw_torch
output_dir: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-4B-Base/SFT-sweep/Qwen3-4B-SFT-LR5e-4/olmo3-dpo/Beta0.1_LR1e-7/
overwrite_output_dir: true
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
gradient_checkpointing: true
save_strategy: "steps"
save_steps: 200
save_total_limit: 20
seed: 8
warmup_ratio: 0.1
length_normalize_logps: false
