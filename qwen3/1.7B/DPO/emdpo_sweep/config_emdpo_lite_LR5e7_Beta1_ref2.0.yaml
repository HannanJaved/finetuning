# EM-DPO-Lite on the original fixed DPO data
model_name_or_path: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-1.7B-Base/SFT/LR5e5/
torch_dtype: bfloat16

dataset_name: allenai/Dolci-Instruct-DPO
dataset_train_split: train

bf16: true
beta: 1.0
do_eval: false
gradient_checkpointing_kwargs:
  use_reentrant: False
learning_rate: 5e-7
log_level: info
logging_steps: 10
lr_scheduler_type: linear
max_length: 4096
max_prompt_length: 512
num_train_epochs: 1
optim: adamw_torch
output_dir: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-1.7B-Base/SFT/Lr5e5/EMDPO_LITE/Beta1_LR5e-7_ref2.0_pol0.0/
overwrite_output_dir: true
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
gradient_checkpointing: true
save_strategy: "steps"
save_steps: 1000
save_total_limit: 20
seed: 8
warmup_ratio: 0.1
resume_from_checkpoint: false
length_normalize_logps: true

emdpo_lite_enabled: true
emdpo_lite_noise_eps: 0.20
emdpo_lite_min_weight: 0.2
emdpo_lite_max_weight: 1.0
emdpo_lite_warmup_steps: 100
emdpo_lite_detach_weights: true
emdpo_lite_ref_scale: 2.0
emdpo_lite_policy_scale: 0.0
emdpo_lite_margin_clip: 5.0
emdpo_lite_length_lr_enabled: true
emdpo_lite_length_lr_interval: 50
