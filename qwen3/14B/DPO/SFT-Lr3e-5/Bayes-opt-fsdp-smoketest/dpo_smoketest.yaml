# Model arguments
model_name_or_path: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-14B-Base/SFT-sweep/Qwen3-14B-SFT-LR3e-5/
torch_dtype: bfloat16

use_liger_kernel: true
attn_implementation: flash_attention_2

dataset_name:
  allenai/Dolci-Instruct-DPO

# DPOTrainer arguments
bf16: true
beta: 0.1
do_train: true
do_eval: true
eval_strategy: steps
eval_steps: 5
gradient_checkpointing_kwargs:
  use_reentrant: False
learning_rate: 1e-7
log_level: info
logging_steps: 1
lr_scheduler_type: linear
max_length: 1024
max_prompt_length: 512
max_steps: 10
optim: adamw_torch
output_dir: /data/horse/ws/hama901h-BFTranslation/checkpoints/Qwen/Qwen3-14B-Base/SFT-sweep-fsdp/smoketest/
overwrite_output_dir: true
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
gradient_checkpointing: true
save_strategy: "no"
seed: 8
warmup_ratio: 0.1
length_normalize_logps: false
dataset_test_split_size: 0.005
dataset_test_split_seed: 42
